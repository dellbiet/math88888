kind = "web"
previewPath = "/"
title = "Toán Lớp 8"
version = "1.0.0"
id = "artifacts/toan-lop-8"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21562

[services.development]
run = "pnpm --filter @workspace/toan-lop-8 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toan-lop-8", "run", "build" ]
publicDir = "artifacts/toan-lop-8/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21562"
BASE_PATH = "/"
